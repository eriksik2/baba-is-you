<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no"
    />
    <meta name="theme-color" content="#1a2332" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="description" content="Baba — a Baba Is You–inspired puzzle you can play on phone or desktop." />
    <title>Baba</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&family=Lilita+One&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <header class="top">
        <div class="top-text">
          <h1 class="brand">Baba</h1>
          <p class="tagline" id="level-name">Loading…</p>
        </div>
        <p id="status" class="status" role="status"></p>
      </header>

      <section class="rules-bar" aria-label="Active rules">
        <h2 class="sr-only">Rules</h2>
        <ul id="rules-list"></ul>
      </section>

      <div class="stage">
        <div class="board-shell">
          <canvas id="game" width="320" height="320" aria-label="Game board. Swipe to move."></canvas>
        </div>

        <aside class="panel desktop-only">
          <h2>Controls</h2>
          <ul class="controls-help">
            <li><kbd>←</kbd><kbd>→</kbd><kbd>↑</kbd><kbd>↓</kbd> / <kbd>WASD</kbd> move</li>
            <li><kbd>Z</kbd> undo · <kbd>R</kbd> restart · <kbd>Space</kbd> wait</li>
            <li>On phone: swipe the board or use the pad</li>
          </ul>
        </aside>
      </div>

      <div class="touch-dock" aria-label="Touch controls">
        <div class="action-row">
          <button type="button" class="btn action" data-intent="undo" aria-label="Undo">Undo</button>
          <button type="button" class="btn action" data-intent="wait" aria-label="Wait">Wait</button>
          <button type="button" class="btn action danger" data-intent="restart" aria-label="Restart">
            Restart
          </button>
        </div>
        <div class="dpad" role="group" aria-label="Move">
          <button type="button" class="btn pad" data-intent="up" aria-label="Up" style="grid-area: up">
            <span aria-hidden="true">▲</span>
          </button>
          <button type="button" class="btn pad" data-intent="left" aria-label="Left" style="grid-area: left">
            <span aria-hidden="true">◀</span>
          </button>
          <div class="pad-hub" style="grid-area: hub" aria-hidden="true"></div>
          <button type="button" class="btn pad" data-intent="right" aria-label="Right" style="grid-area: right">
            <span aria-hidden="true">▶</span>
          </button>
          <button type="button" class="btn pad" data-intent="down" aria-label="Down" style="grid-area: down">
            <span aria-hidden="true">▼</span>
          </button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
